<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>ICC Music App</title>
  
  <meta name="description" content="Panel de Adoración - ICC Villa Rosario">
  <meta name="apple-mobile-web-app-title" content="ICC Music">
  
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#020617">
  
  <link rel="icon" type="image/png" href="icon-192.png">
  <link rel="apple-touch-icon" href="icon-192.png">
  
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <script src="https://unpkg.com/react@17/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@17/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/htm@3.1.1/dist/htm.umd.js"></script>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
  
  <style>
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #020617; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }
  </style>
</head>
<body>
  <div id="root">
    <div style="height: 100vh; display: flex; align-items: center; justify-content: center; flex-direction: column; color: #eab308; background-color: #020617; text-align: center; padding: 0 1.5rem;">
      <div style="margin-bottom: 1.5rem; animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; color: #eab308;">
        <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
      </div>
      <h1 style="font-size: 1.875rem; line-height: 2.25rem; font-family: serif; color: white; margin-bottom: 0.5rem; letter-spacing: 0.1em; font-weight: bold;">GRUPO DE ALABANZA</h1>
      <h2 style="font-size: 1.25rem; line-height: 1.75rem; font-family: 'Cinzel', serif; color: #eab308; letter-spacing: 0.2em; margin-bottom: 3rem;">ICC VILLA ROSARIO</h2>
      <div style="position: absolute; bottom: 2.5rem; left: 0; right: 0; text-align: center; opacity: 0.5;">
        <p style="font-size: 10px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.1em;">Creado por</p>
        <p style="font-size: 0.75rem; line-height: 1rem; font-weight: bold; color: white; text-transform: uppercase; letter-spacing: 0.05em; margin-top: 0.25rem;">Gerson Arrieta</p>
      </div>
    </div>
  </div>

  <script src="app.js?v=8.1"></script>
  
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(registration => {
            console.log('ServiceWorker registrado con éxito: ', registration.scope);
          })
          .catch(err => {
            console.log('Fallo al registrar el ServiceWorker: ', err);
          });
      });
    }
  </script>
</body>
</html>
